name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    env:
      PREVIEW_URL: http://127.0.0.1:4400
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/node_modules/.cache/ms-playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist asset URLs
        run: npm run verify:assets

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start preview server
        run: |
          npm run preview -- --port 4400 --host 127.0.0.1 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:4400/ >/dev/null; then
              echo "Preview ready on :4400"
              exit 0
            fi
            sleep 2
          done
          echo "Preview server failed to start"
          exit 1

      - name: Run verification suite
        run: |
          node scripts/verify-article-toc.mjs
          node scripts/verify-toc-reposition.mjs
